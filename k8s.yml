apiVersion: apps/v1
kind: Deployment
metadata:
    name: model
    namespace: web
spec:
    replicas: 1
    strategy:
        type: RollingUpdate
        rollingUpdate:
            maxSurge: 1
            maxUnavailable: 0
    selector:
        matchLabels:
            app: model
    template:
        metadata:
            labels:
                app: model
        spec:
            containers:
                - name: model
                  image: ghcr.io/false-ltd/model:latest
                  imagePullPolicy: Always
                  ports:
                      - containerPort: 8080
                  env:
                      - name: MODEL_DATABASE_DSN
                        valueFrom:
                            secretKeyRef:
                                name: model-secrets
                                key: database-dsn
                  resources:
                      requests:
                          memory: "64Mi"
                          cpu: "50m"
                      limits:
                          memory: "256Mi"
                          cpu: "500m"
                  startupProbe:
                      httpGet:
                          path: /health
                          port: 8080
                      failureThreshold: 10
                      periodSeconds: 3
                  readinessProbe:
                      httpGet:
                          path: /health
                          port: 8080
                      initialDelaySeconds: 3
                      periodSeconds: 10
                  livenessProbe:
                      httpGet:
                          path: /health
                          port: 8080
                      initialDelaySeconds: 10
                      periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
    name: model
    namespace: web
spec:
    selector:
        app: model
    ports:
        - port: 80
          targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
    name: model
    namespace: web
    annotations:
        nginx.ingress.kubernetes.io/ssl-redirect: "true"
        cert-manager.io/cluster-issuer: "letsencrypt"
spec:
    ingressClassName: nginx
    tls:
        - hosts:
              - model.false.ltd
          secretName: model-tls
    rules:
        - host: model.false.ltd
          http:
              paths:
                  - path: /
                    pathType: Prefix
                    backend:
                        service:
                            name: model
                            port:
                                number: 80
