name: Build and Deploy

on:
    push:
        branches: [main]

concurrency:
    group: deploy-${{ github.ref }}
    cancel-in-progress: true

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}
    NAMESPACE: web

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Log in to Container Registry
              uses: docker/login-action@v4
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@v6
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=sha,prefix=sha-
                      type=raw,value=latest

            - name: Build and push
              uses: docker/build-push-action@v7
              with:
                  context: .
                  push: true
                  platforms: linux/amd64,linux/arm64
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  build-args: |
                      GIT_SHA=${{ github.sha }}

    deploy:
        needs: build-and-push
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Install kubectl
              uses: azure/setup-kubectl@v5
              with:
                  version: "latest"

            - name: Configure kubeconfig
              run: |
                  mkdir -p $HOME/.kube
                  echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
                  chmod 600 $HOME/.kube/config

            - name: Create secrets
              run: |
                  kubectl create secret generic model-secrets \
                    --from-literal=database-dsn=${{ secrets.MODEL_DATABASE_DSN }} \
                    --from-literal=api-keys=${{ secrets.MODEL_API_KEYS }} \
                    --from-literal=cors-origins=${{ secrets.CORS_ALLOWED_ORIGINS }} \
                    --dry-run=client -o yaml | kubectl apply -n ${{ env.NAMESPACE }} -f -

            - name: Set image tag
              run: |
                  sed -i "s|ghcr.io/false-ltd/model:latest|ghcr.io/false-ltd/model:sha-${GITHUB_SHA::7}|g" k8s.yml

            - name: Deploy to k3s
              run: |
                  kubectl apply -f k8s.yml
                  kubectl rollout status deployment/model -n ${{ env.NAMESPACE }} --timeout=120s

            - name: Debug pod logs on failure
              if: failure()
              run: |
                  kubectl logs -l app=model -n ${{ env.NAMESPACE }} --tail=50 || true
                  kubectl describe pods -l app=model -n ${{ env.NAMESPACE }} | tail -30 || true

            - name: Rollback on failure
              if: failure()
              run: |
                  kubectl rollout undo deployment/model -n ${{ env.NAMESPACE }}
                  echo "Deployment failed, rolled back to previous revision"
